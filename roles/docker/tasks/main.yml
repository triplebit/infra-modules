---
- name: Prerequisites
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: true

- name: Docker apt signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker Engine
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

# Without this, the default json-file driver grows container logs UNBOUNDED
# (a bundled caddy once reached 90G in 3 months). The 'local' driver rotates
# by default; limits made explicit anyway. Applies to newly created
# containers only — recreate existing ones to adopt it.
- name: Docker daemon configuration (bounded container logs)
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "local",
        "log-opts": {
          "max-size": "20m",
          "max-file": "5"
        }
      }
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart docker

- name: Docker enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Docker group membership
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_group_members }}"
