---
- name: Base packages (ansible + helpers; age comes from upstream below)
  ansible.builtin.apt:
    name: [ansible, curl, git, jq, unzip, ca-certificates, apt-transport-https, gnupg]
    state: present
    update_cache: true

- name: Check for gh
  ansible.builtin.command: gh --version
  register: iac_toolchain_gh
  failed_when: false
  changed_when: false

# gh is NOT in Debian's repos (GitHub self-distributes); pinned release deb.
# The drift workflow's issue reporting uses the gh CLI on the runner.
- name: Download gh (checksum-pinned release deb)
  ansible.builtin.get_url:
    url: "https://github.com/cli/cli/releases/download/v{{ iac_toolchain_gh_version }}/gh_{{ iac_toolchain_gh_version }}_linux_amd64.deb"
    dest: "/tmp/gh_{{ iac_toolchain_gh_version }}.deb"
    checksum: "sha256:{{ iac_toolchain_gh_sha256 }}"
    mode: "0644"
  when: >-
    iac_toolchain_gh.rc != 0 or
    iac_toolchain_gh_version not in (iac_toolchain_gh.stdout | default(''))

- name: Install gh
  ansible.builtin.apt:
    deb: "/tmp/gh_{{ iac_toolchain_gh_version }}.deb"
  when: >-
    iac_toolchain_gh.rc != 0 or
    iac_toolchain_gh_version not in (iac_toolchain_gh.stdout | default(''))

- name: Debian-packaged age absent (pre-1.3, no native post-quantum)
  ansible.builtin.apt:
    name: age
    state: absent

- name: Check for age
  ansible.builtin.command: age --version
  register: iac_toolchain_age
  failed_when: false
  changed_when: false

- name: Download age (checksum-pinned upstream release)
  ansible.builtin.get_url:
    url: "https://github.com/FiloSottile/age/releases/download/v{{ iac_toolchain_age_version }}/age-v{{ iac_toolchain_age_version }}-linux-amd64.tar.gz"
    dest: "/tmp/age-{{ iac_toolchain_age_version }}.tar.gz"
    checksum: "sha256:{{ iac_toolchain_age_sha256 }}"
    mode: "0644"
  when: >-
    iac_toolchain_age.rc != 0 or
    iac_toolchain_age_version not in (iac_toolchain_age.stdout | default(''))

- name: Unpack age
  ansible.builtin.unarchive:
    src: "/tmp/age-{{ iac_toolchain_age_version }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: >-
    iac_toolchain_age.rc != 0 or
    iac_toolchain_age_version not in (iac_toolchain_age.stdout | default(''))

- name: Install age + age-keygen
  ansible.builtin.copy:
    src: "/tmp/age/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  loop: [age, age-keygen]
  when: >-
    iac_toolchain_age.rc != 0 or
    iac_toolchain_age_version not in (iac_toolchain_age.stdout | default(''))

- name: Check for OpenTofu
  ansible.builtin.command: tofu --version
  register: iac_toolchain_tofu
  failed_when: false
  changed_when: false

- name: OpenTofu apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: iac_toolchain_tofu.rc != 0

- name: OpenTofu release key
  ansible.builtin.get_url:
    url: https://get.opentofu.org/opentofu.gpg
    dest: /etc/apt/keyrings/opentofu.gpg
    owner: root
    group: root
    mode: "0644"
  when: iac_toolchain_tofu.rc != 0

- name: OpenTofu repository key
  ansible.builtin.get_url:
    url: https://packages.opentofu.org/opentofu/tofu/gpgkey
    dest: /etc/apt/keyrings/opentofu-repo.asc
    owner: root
    group: root
    mode: "0644"
  when: iac_toolchain_tofu.rc != 0

- name: OpenTofu apt source
  ansible.builtin.copy:
    content: |
      deb [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.asc] https://packages.opentofu.org/opentofu/tofu/any/ any main
      deb-src [signed-by=/etc/apt/keyrings/opentofu.gpg,/etc/apt/keyrings/opentofu-repo.asc] https://packages.opentofu.org/opentofu/tofu/any/ any main
    dest: /etc/apt/sources.list.d/opentofu.list
    owner: root
    group: root
    mode: "0644"
  when: iac_toolchain_tofu.rc != 0

- name: Install OpenTofu from signed apt repository
  ansible.builtin.apt:
    name: tofu
    state: present
    update_cache: true
  when: iac_toolchain_tofu.rc != 0

- name: Check for sops
  ansible.builtin.command: sops --version
  register: iac_toolchain_sops
  failed_when: false
  changed_when: false

- name: Install sops (checksum-pinned release binary)
  ansible.builtin.get_url:
    url: "https://github.com/getsops/sops/releases/download/v{{ iac_toolchain_sops_version }}/sops-v{{ iac_toolchain_sops_version }}.linux.amd64"
    dest: /usr/local/bin/sops
    checksum: "sha256:{{ iac_toolchain_sops_sha256 }}"
    owner: root
    group: root
    mode: "0755"
  when: >-
    iac_toolchain_sops.rc != 0 or
    iac_toolchain_sops_version not in (iac_toolchain_sops.stdout | default(''))
