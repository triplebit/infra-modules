---
- name: Runner prerequisites
  ansible.builtin.apt:
    name: [curl, jq, openssl, libicu76, liblttng-ust1, libkrb5-3, zlib1g, libssl3]
    state: present
    update_cache: true

- name: Runner user (unprivileged, no sudo — everything it can read, jobs can read)
  ansible.builtin.user:
    name: "{{ github_runner_user }}"
    home: "/home/{{ github_runner_user }}"
    shell: /usr/sbin/nologin
    password_lock: true

- name: Pristine runner dist directory (root-owned — jobs cannot write here)
  ansible.builtin.file:
    path: "{{ github_runner_dist_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Live runner directory (re-laid-down from dist before every job)
  ansible.builtin.file:
    path: "{{ github_runner_dir }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: "0755"

- name: Download actions-runner (checksum-pinned)
  ansible.builtin.get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ github_runner_version }}/actions-runner-linux-x64-{{ github_runner_version }}.tar.gz"
    dest: "/tmp/actions-runner-{{ github_runner_version }}.tar.gz"
    checksum: "sha256:{{ github_runner_sha256 }}"
    mode: "0644"

- name: Check pristine runner dist version
  ansible.builtin.stat:
    path: "{{ github_runner_dist_dir }}/.runner-{{ github_runner_version }}-{{ github_runner_sha256 }}"
  register: github_runner_dist_marker

- name: Clear stale pristine runner dist
  ansible.builtin.file:
    path: "{{ github_runner_dist_dir }}"
    state: absent
  when: not github_runner_dist_marker.stat.exists
  notify: Restart github-runner

- name: Pristine runner dist directory recreated after version changes
  ansible.builtin.file:
    path: "{{ github_runner_dist_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: not github_runner_dist_marker.stat.exists

- name: Unpack runner into the PRISTINE dist (root-owned)
  ansible.builtin.unarchive:
    src: "/tmp/actions-runner-{{ github_runner_version }}.tar.gz"
    dest: "{{ github_runner_dist_dir }}"
    remote_src: true
    owner: root
    group: root
  when: not github_runner_dist_marker.stat.exists
  notify: Restart github-runner

- name: Mark pristine runner dist version
  ansible.builtin.copy:
    content: "{{ github_runner_version }} {{ github_runner_sha256 }}\n"
    dest: "{{ github_runner_dist_dir }}/.runner-{{ github_runner_version }}-{{ github_runner_sha256 }}"
    owner: root
    group: root
    mode: "0644"
  when: not github_runner_dist_marker.stat.exists
  notify: Restart github-runner

- name: Per-job redeploy script (root; wipes + restores binaries each start)
  ansible.builtin.copy:
    content: |
      #!/bin/sh
      # Lay down pristine binaries before each job so a previous job cannot
      # persist tampering. JIT writes .runner/.credentials here at startup,
      # so the live dir is runner-owned (writable); _work/_diag are wiped by
      # the unit's other ExecStartPre.
      set -eu
      rm -rf "{{ github_runner_dir }}"
      mkdir -p "{{ github_runner_dir }}"
      cp -a "{{ github_runner_dist_dir }}/." "{{ github_runner_dir }}/"
      chown -R {{ github_runner_user }}:{{ github_runner_user }} "{{ github_runner_dir }}"
    dest: /usr/local/bin/redeploy-runner.sh
    owner: root
    group: root
    mode: "0700"
  notify: Restart github-runner

- name: Config directory (root-owned; holds the App key + job-facing env)
  ansible.builtin.file:
    path: /etc/github-runner
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: GitHub App private key (root-only — out of job reach)
  ansible.builtin.copy:
    content: "{{ github_runner_app_key }}"
    dest: /etc/github-runner/app.pem
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart github-runner

- name: Runner environment (job-facing deploy credentials)
  ansible.builtin.template:
    src: runner.env.j2
    dest: /etc/github-runner/runner.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart github-runner

- name: Runner mint environment (root-only registration parameters)
  ansible.builtin.template:
    src: mint.env.j2
    dest: /etc/github-runner/mint.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart github-runner

- name: JIT mint script (runs as root via ExecStartPre=+)
  ansible.builtin.copy:
    src: mint-jit.sh
    dest: /usr/local/bin/mint-jit.sh
    owner: root
    group: root
    mode: "0700"
  notify: Restart github-runner

- name: Runner service unit
  ansible.builtin.copy:
    src: github-runner.service
    dest: /etc/systemd/system/github-runner.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart github-runner

- name: Runner enabled and running
  ansible.builtin.systemd:
    name: github-runner
    enabled: true
    state: started
    daemon_reload: true
