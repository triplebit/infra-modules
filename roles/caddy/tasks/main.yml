---
- name: Install prerequisites
  ansible.builtin.apt:
    name: [debian-keyring, debian-archive-keyring, apt-transport-https, gnupg]
    state: present
    update_cache: true

- name: Caddy apt signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /usr/share/keyrings/caddy-stable.asc
    mode: "0644"

- name: Caddy apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    filename: caddy-stable
    state: present

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
    update_cache: true

- name: Systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: "0755"

- name: Load /etc/caddy/caddy.env into the service
  ansible.builtin.copy:
    dest: /etc/systemd/system/caddy.service.d/override.conf
    content: |
      [Service]
      EnvironmentFile=-/etc/caddy/caddy.env
    mode: "0644"
  notify: Restart caddy

- name: Environment file (secrets for {$VARS} in the Caddyfile)
  ansible.builtin.copy:
    dest: /etc/caddy/caddy.env
    content: |
      {% for k, v in caddy_env.items() %}
      {{ k }}={{ v }}
      {% endfor %}
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart caddy

- name: List installed Caddy modules
  ansible.builtin.command: caddy list-modules
  register: caddy_modules
  changed_when: false

- name: Add Caddy packages (rebuilds the binary in place)
  ansible.builtin.command: "caddy add-package {{ item }}"
  loop: "{{ caddy_packages }}"
  # heuristic: the module name contains the package's last path component
  when: (item | basename) not in caddy_modules.stdout
  notify: Restart caddy

- name: Deploy Caddyfile
  ansible.builtin.copy:
    src: "{{ caddy_caddyfile }}"
    dest: /etc/caddy/Caddyfile
    owner: root
    group: caddy
    mode: "0640"
    # validate provisions modules (not just parse), and e.g. the cloudflare
    # DNS plugin rejects an empty token — source the same env file the
    # service runs with (deployed earlier in this role).
    validate: /bin/bash -c 'set -a; [ -f /etc/caddy/caddy.env ] && . /etc/caddy/caddy.env; exec caddy validate --adapter caddyfile --config %s'
  notify: Reload caddy

- name: Caddy enabled and running
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
